<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onca Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --toolbar-h:48px;--date-month-h:24px;--date-day-h:26px;--date-h:50px;
  --row-h:34px;--add-row-h:22px;--handle-w:14px;
  --col-name:172px;--col-pages:46px;--col-start:76px;--col-dead:76px;--col-member:88px;
  --left-w:calc(var(--handle-w) + var(--col-name) + var(--col-pages) + var(--col-start) + var(--col-dead) + var(--col-member));
  --cell-w:26px;--panel-w:300px;
  --bg:#f5f4f1;--surface:#fff;--surface2:#f9f8f6;--surface3:#f0efe9;
  --border:#e2e0d8;--border2:#d4d2c8;
  --text:#1a1916;--text2:#6b6960;--text3:#a8a69e;
  --today-bg:#fff9e6;--today-line:#d4a017;
  --weekend-bg:#e8e7e2;--nwd-bg:#dddbd4;--pinned-bg:#f7f6f3;
  --pin-color:#1a1916;--archive-bar-c:#6b6960;
  --status-submitted:#e8f5e9;--status-testup:#fffde7;--status-done:#f0f0ee;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:13px;}

/* toolbar */
#toolbar{height:var(--toolbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 12px;flex-shrink:0;z-index:200;}
#app-name{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.12em;color:var(--text2);margin-right:4px;}
.tb-div{width:1px;height:18px;background:var(--border);margin:0 2px;}
.tb-btn{height:28px;padding:0 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.tb-btn:hover{background:var(--surface3);color:var(--text);}
.tb-btn.primary{background:var(--text);color:#fff;border-color:var(--text);}.tb-btn.primary:hover{opacity:.85;}
.tb-btn.toggle-on{background:#e8f0ff;color:#2a4db5;border-color:#b8c8f0;}
.tb-btn.filter-active{background:#fef3e2;color:#b45309;border-color:#fcd34d;}
#today-btn{height:28px;padding:0 10px;background:var(--today-bg);border:1px solid #e8d090;border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--today-line);cursor:pointer;letter-spacing:.06em;}
#today-btn:hover{background:#fff5d0;}
#legend{display:flex;gap:5px;align-items:center;margin-left:auto;flex-wrap:wrap;max-width:360px;}
.leg-wrap{position:relative;cursor:pointer;}
.leg-dot{width:14px;height:14px;border-radius:3px;border:1.5px solid #fff;box-shadow:0 0 0 1px #00000018;transition:transform .12s;}
.leg-wrap:hover .leg-dot{transform:scale(1.2);}
.leg-tip{position:absolute;top:calc(100%+6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:300;}
.leg-wrap:hover .leg-tip{opacity:1;}
#leg-add{width:14px;height:14px;border-radius:3px;border:1.5px dashed var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);}
#leg-add:hover{border-color:var(--text3);color:var(--text2);}

/* filter dropdown */
#filter-wrap{position:relative;}
#filter-dropdown{position:absolute;top:calc(100%+4px);left:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px;z-index:500;min-width:140px;box-shadow:0 4px 20px #00000018;display:none;}
#filter-dropdown.open{display:block;}
.filter-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--text2);}
.filter-item:hover{background:var(--surface2);}
.filter-item input[type=checkbox]{accent-color:var(--text);width:13px;height:13px;}
.filter-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* main */
#main{display:flex;flex:1;overflow:hidden;}

/* left pane */
#left-pane{width:var(--left-w);flex-shrink:0;display:flex;flex-direction:column;border-right:1.5px solid var(--border2);background:var(--surface);z-index:100;}
#left-header{height:var(--date-h);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;flex-shrink:0;}
.lh-col{display:flex;align-items:center;height:var(--date-day-h);padding:0 5px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.04em;color:var(--text3);border-right:1px solid var(--border);}
.lh-handle{width:var(--handle-w);flex-shrink:0;border-right:1px solid var(--border);}
.lh-name{width:var(--col-name);}.lh-pages{width:var(--col-pages);}.lh-start{width:var(--col-start);}.lh-dead{width:var(--col-dead);}.lh-member{width:var(--col-member);border-right:none;}
#left-rows{flex:1;overflow:hidden;}
.lp-group{border-bottom:1px solid var(--border);}
.lp-group.pinned-group{background:var(--pinned-bg);}
.lp-row{height:var(--row-h);display:flex;align-items:center;border-bottom:1px solid var(--border)22;}
.lp-row:last-of-type{border-bottom:none;}
.drag-handle{width:var(--handle-w);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;cursor:grab;height:100%;border-right:1px solid var(--border);}
.drag-handle:active{cursor:grabbing;}
.lp-cell{height:100%;display:flex;align-items:center;padding:0 5px;overflow:hidden;}
.lp-name{width:var(--col-name);border-right:1px solid var(--border);font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:background .1s;}
.lp-name:hover{background:var(--surface2);}
.lp-name.second{color:transparent;pointer-events:none;}.lp-name.second:hover{background:none;}
.lp-pages{width:var(--col-pages);border-right:1px solid var(--border);font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);}
.lp-pages.second{color:transparent;}
.lp-start,.lp-dead{width:var(--col-start);border-right:1px solid var(--border);font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap;}
.lp-dead{width:var(--col-dead);}
.lp-start.second,.lp-dead.second{color:transparent;}
.lp-member-cell{width:var(--col-member);}
.member-tag{font-size:11px;font-weight:500;padding:2px 6px;border-radius:3px;white-space:nowrap;cursor:pointer;transition:opacity .12s;}
.member-tag:hover{opacity:.75;}
.lp-add-row{height:var(--add-row-h);display:flex;align-items:center;padding:0 5px 0 calc(var(--handle-w)+5px);font-size:10px;color:var(--text3);cursor:pointer;border-top:1px dashed var(--border);gap:4px;}
.lp-add-row:hover{color:var(--text2);}
#pinned-sep{display:flex;align-items:center;height:24px;padding:0 8px;background:var(--surface3);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--text3);}
#left-footer{border-top:1px solid var(--border);padding:5px 8px;}
#add-proj-foot{width:100%;height:26px;background:none;border:1px dashed var(--border2);border-radius:5px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
#add-proj-foot:hover{background:var(--surface2);color:var(--text2);}
.status-submitted .lp-name{background:var(--status-submitted);}
.status-testup .lp-name{background:var(--status-testup);}
.status-done .lp-name{background:var(--status-done);color:var(--text3);}

/* scroll pane */
#scroll-pane{flex:1;overflow:auto;position:relative;}
#scroll-pane::-webkit-scrollbar{width:7px;height:7px;}
#scroll-pane::-webkit-scrollbar-track{background:var(--bg);}
#scroll-pane::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
#gantt-inner{display:flex;flex-direction:column;min-height:100%;position:relative;height:max-content;}
#date-header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1.5px solid var(--border2);flex-shrink:0;height:var(--date-h);display:flex;flex-direction:column;}
#month-row{display:flex;height:var(--date-month-h);}
#day-row{display:flex;height:var(--date-day-h);}
.month-cell{height:var(--date-month-h);flex-shrink:0;display:flex;align-items:center;padding:0 7px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.07em;color:var(--text2);border-right:1px solid var(--border);background:var(--surface2);}
.day-cell{width:var(--cell-w);height:var(--date-day-h);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);border-right:1px solid var(--border);position:relative;gap:1px;user-select:none;}
.day-cell.sat{color:#5080c0;}.day-cell.sun,.day-cell.hol{color:#c05050;}
.day-cell.nwd{background:var(--nwd-bg);}
.day-cell.arc-hdr{background:#eceae3;color:#b0ae a6;}
.day-cell.today-hdr{background:var(--today-bg);color:var(--today-line);font-weight:500;}

/* grid */
#rows-area{flex:1;}
.grid-group{border-bottom:1px solid var(--border);}
.grid-group.pinned-grid{background:var(--pinned-bg);}
.grid-row{height:var(--row-h);display:flex;border-bottom:1px solid #e8e6de55;}
.grid-row:last-of-type{border-bottom:none;}
.grid-spacer{height:var(--add-row-h);border-top:1px dashed var(--border);}
.grid-sep{height:24px;background:var(--surface3);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);}
.grid-cell{width:var(--cell-w);height:var(--row-h);flex-shrink:0;border-right:1px solid #e8e6de88;border-bottom:1px solid #e8e6de44;position:relative;cursor:crosshair;overflow:visible;transition:background .06s;}
.grid-cell.nwd-cell{background:var(--nwd-bg) !important;cursor:not-allowed;}
.grid-cell.arc-cell{background:#eceae3;}
.grid-cell.wknd{background:var(--weekend-bg);}
.grid-cell.td{background:var(--today-bg);}

/* pin */
.pin-wrap{position:absolute;bottom:3px;left:0;height:14px;z-index:20;display:flex;align-items:center;}
.pin-label-inner{height:14px;background:var(--pin-color);color:#fff;font-size:9px;font-weight:500;font-family:'DM Mono',monospace;padding:0 5px;border-radius:3px;box-shadow:0 0 0 1.5px #fff,0 1px 3px #00000022;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;width:100%;user-select:none;}
.pin-resize{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:col-resize;z-index:21;border-radius:0 3px 3px 0;}
.pin-resize:hover{background:#ffffff55;}
.pin-input-wrap{position:absolute;bottom:3px;left:0;height:14px;z-index:30;}
.pin-input{height:14px;min-width:70px;padding:0 5px;font-size:9px;font-family:'DM Mono',monospace;background:var(--pin-color);color:#fff;border:none;border-radius:3px;box-shadow:0 0 0 1.5px var(--today-line);outline:none;}
.cell-inline-input{position:absolute;inset:0;width:100%;height:100%;padding:0 5px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);border:1.5px solid var(--today-line);border-radius:0;outline:none;z-index:10;}
.lp-cell.editing{position:relative;overflow:visible;}

/* today line + archive bar */

#archive-bar{position:absolute;top:0;bottom:0;width:3px;background:var(--archive-bar-c);opacity:.65;cursor:col-resize;z-index:45;transition:opacity .12s;}
#archive-bar::before{content:'';position:absolute;top:0;bottom:0;left:-6px;right:-6px;cursor:col-resize;}
#archive-bar:hover{opacity:1;}
#archive-bar-label{position:absolute;top:6px;left:6px;background:var(--archive-bar-c);color:#fff;font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;}
#archive-bar:hover #archive-bar-label,#archive-bar.dragging #archive-bar-label{opacity:1;}

/* drag-over */
.lp-group.drag-over-top{border-top:2px solid var(--today-line);}
.lp-group.drag-over-bottom{border-bottom:2px solid var(--today-line);}

/* side panel */
#panel-overlay{position:fixed;inset:0;z-index:400;display:none;pointer-events:none;}
#panel-overlay.open{display:block;}
#side-panel{position:absolute;right:0;top:0;bottom:0;width:var(--panel-w);background:var(--surface);border-left:1px solid var(--border2);box-shadow:-4px 0 24px #00000014;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;pointer-events:auto;z-index:401;}
#panel-overlay.open #side-panel{transform:translateX(0);}
#panel-header{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
#panel-title{font-size:13px;font-weight:500;color:var(--text);}
#panel-close{width:28px;height:28px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
#panel-close:hover{background:var(--surface2);color:var(--text);}
#panel-body{flex:1;overflow-y:auto;padding:16px;}
#panel-body::-webkit-scrollbar{width:5px;}
#panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
#panel-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
.fg input,.fg select{width:100%;height:32px;padding:0 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--border2);}
.btn-c{height:32px;padding:0 14px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer;}
.btn-c:hover{background:var(--surface3);}
.btn-ok{height:32px;padding:0 16px;background:var(--text);border:1px solid var(--text);border-radius:5px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:#fff;cursor:pointer;}
.btn-ok:hover{opacity:.85;}
.btn-danger{height:32px;padding:0 14px;background:none;border:1px solid #e0b0b0;border-radius:5px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:#c03030;cursor:pointer;margin-right:auto;}
.btn-danger:hover{background:#fff0f0;}
.palette-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:4px;}
.pswatch{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;}
.pswatch:hover{transform:scale(1.15);}.pswatch.sel{border-color:var(--text);}
.hex-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.hex-row input[type=color]{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;padding:1px;cursor:pointer;background:none;}
.hex-row input[type=text]{flex:1;height:28px;padding:0 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text);outline:none;}

/* ctx */
#ctx{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:4px;z-index:999;display:none;min-width:160px;box-shadow:0 4px 20px #00000018;}
.ctx-item{padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:7px;}
.ctx-item:hover{background:var(--surface2);color:var(--text);}
.ctx-item.danger{color:#c03030;}.ctx-item.danger:hover{background:#fff0f0;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-sub{position:relative;}
.ctx-sub-menu{position:absolute;left:100%;top:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:4px;min-width:160px;box-shadow:0 4px 20px #00000018;display:none;z-index:1000;}
.ctx-sub:hover .ctx-sub-menu{display:block;}

/* undo indicator */
#undo-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;font-family:'DM Mono',monospace;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:600;}
#undo-toast.show{opacity:1;}

@media(max-width:768px){
  #left-pane{display:none;}
  .tb-btn.primary,#btn-add-member,#btn-filter,#btn-show-done,#btn-save,#btn-load{display:none;}
  #toolbar{padding:0 8px;gap:4px;}
  #legend{max-width:200px;}
}
</style>
</head>
<body>
<div id="toolbar">
  <span id="app-name">ONCA CHART</span>
  
  <div class="tb-div"></div>
  <button id="today-btn">TODAY</button>
  <div class="tb-div"></div>
  <button class="tb-btn primary" id="btn-add-proj">＋ 案件</button>
  <button class="tb-btn" id="btn-add-member">＋ メンバー</button>
  <div id="filter-wrap">
    <button class="tb-btn" id="btn-filter">担当者フィルタ ▾</button>
    <div id="filter-dropdown"></div>
  </div>
  <button class="tb-btn" id="btn-show-done">完了済みを表示</button>
  <div class="tb-div"></div>
  <button class="tb-btn" id="btn-save">保存</button>
  <button class="tb-btn" id="btn-load">読込</button>
  <div id="legend"></div>
  <button id="leg-add" title="メンバー追加">＋</button>
</div>
<div id="main">
  <div id="left-pane">
    <div id="left-header">
      <div class="lh-handle"></div>
      <div class="lh-col lh-name">案件名</div>
      <div class="lh-col lh-pages">P数</div>
      <div class="lh-col lh-start">制作開始</div>
      <div class="lh-col lh-dead">期限</div>
      <div class="lh-col lh-member">担当</div>
    </div>
    <div id="left-rows"></div>
    <div id="left-footer"><button id="add-proj-foot">＋ 案件を追加</button></div>
  </div>
  <div id="scroll-pane">
    <div id="gantt-inner">
      <div id="date-header"><div id="month-row"></div><div id="day-row"></div></div>
      <div id="rows-area"></div>
      <div id="archive-bar"><div id="archive-bar-label"></div></div>
    </div>
  </div>
</div>
<div id="panel-overlay">
  <div id="side-panel">
    <div id="panel-header"><span id="panel-title"></span><button id="panel-close">✕</button></div>
    <div id="panel-body"></div>
    <div id="panel-footer"></div>
  </div>
</div>
<div id="ctx"></div>
<div id="undo-toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none">

<script>
const PALETTE=['#3b7dd8','#d63b3b','#2e9e6b','#c47d0e','#7c4dcc','#c2385a','#1a8fa8','#6b8f00','#b05e00','#3a5fa8','#8a3bab','#1e8c5c','#c06b20','#5b7dd8','#c23860','#2b9e82','#7a6a00','#5e3bcc','#b83838','#0e7a6e','#c45a0e','#4a6ecc','#9c2e9c','#3aab4a','#c47000','#2e52b8','#cc4444','#228c44','#a05010','#6644cc'];
const HOLIDAYS=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23']);
const STATUS_LABELS={active:'進行中',submitted:'入稿済み',testup:'テストアップ済み',done:'完了'};

function uid(p){return p+'_'+Math.random().toString(36).slice(2,8);}
function dk(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function todayStr(){return dk(new Date());}
function isWknd(d){const w=d.getDay();return w===0||w===6;}
function isHol(d){return HOLIDAYS.has(dk(d));}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}

let state={

// ── NON-WORKING DAYS ──
function isNWD(dstr){
  if(state.removedHolidays.includes(dstr)) return false;
  const d=new Date(dstr.replace(/-/g,'/'));  // slash = local time (JST)
  if(isWknd(d)||isHol(d)) return true;
  return state.customNonWorkingDays.includes(dstr);
}

// ── UNDO/REDO ──
const MAX_HISTORY=50;
let history=[];
let historyIdx=-1;
let skipHistory=false;

function saveHistory(){
  if(skipHistory) return;
  const snap=JSON.stringify({
    projects:state.projects.map(p=>({...p,rows:p.rows.map(r=>({...r,cells:{...r.cells}}))})),
    pins:JSON.parse(JSON.stringify(state.pins)),
    customNonWorkingDays:[...state.customNonWorkingDays],
    removedHolidays:[...state.removedHolidays],
  });
  history=history.slice(0,historyIdx+1);
  history.push(snap);
  if(history.length>MAX_HISTORY) history.shift();
  historyIdx=history.length-1;
}

function restoreSnap(snap){
  const d=JSON.parse(snap);
  skipHistory=true;
  state.projects=d.projects;
  state.pins=d.pins;
  state.customNonWorkingDays=d.customNonWorkingDays;
  state.removedHolidays=d.removedHolidays;
  skipHistory=false;
  render();
}

function undo(){
  if(historyIdx<=0){showToast('これ以上戻れません');return;}
  historyIdx--;
  restoreSnap(history[historyIdx]);
  showToast('元に戻した');
}
function redo(){
  if(historyIdx>=history.length-1){showToast('これ以上進めません');return;}
  historyIdx++;
  restoreSnap(history[historyIdx]);
  showToast('やり直した');
}

function showToast(msg){
  const t=document.getElementById('undo-toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1200);
}

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
});

// init history
saveHistory();

let showDone=false;
let filterMembers=new Set();
function getMem(id){return state.members.find(m=>m.id===id)||{name:'?',color:'#aaa'};}

function getStartDate(){return addD(new Date(),- 90);}
function getDays(){const s=getStartDate(),days=[];for(let i=0;i<270;i++)days.push(addD(s,i));return days;}
function isArchived(dstr){return dstr<=state.view.archiveBefore;}

function visProjects(){
  let projs=state.projects;
  // filter: show only rows belonging to selected members
  if(filterMembers.size>0){
    projs=projs
      .filter(p=>p.rows.some(r=>filterMembers.has(r.memberId)))
      .map(p=>({...p,rows:p.rows.filter(r=>filterMembers.has(r.memberId))}));
  }
  const norm=projs.filter(p=>!p.pinned&&(showDone||p.status!=='done')).sort((a,b)=>a.order-b.order);
  const pin=projs.filter(p=>p.pinned&&(showDone||p.status!=='done')).sort((a,b)=>a.order-b.order);
  return{norm,pin};
}

// ── DRAG cells (with linear interpolation) ──
let drag={on:false,rowId:null,painting:null,lastIdx:-1};
let dragProj={on:false,projId:null,pinned:false};

document.addEventListener('mousemove',e=>{
  if(!drag.on)return;
  const el=document.elementFromPoint(e.clientX,e.clientY);if(!el)return;
  const cell=el.closest('.grid-cell');if(!cell)return;
  if(cell.classList.contains('nwd-cell'))return;
  const dstr=cell.dataset.dk,rowId=cell.dataset.rowId;
  if(!dstr||rowId!==drag.rowId)return;
  const curIdx=parseInt(cell.dataset.di);
  // linear interpolation
  const days=getDays();
  const from=drag.lastIdx>=0?drag.lastIdx:curIdx;
  const to=curIdx;
  const step=from<=to?1:-1;
  for(let i=from;i!==to+step;i+=step){
    if(i<0||i>=days.length)continue;
    const dstr2=dk(days[i]);
    if(isNWD(dstr2))continue;
    // skip arc/nwd cells to prevent bleed across gaps
    const tCell=document.querySelector(`.grid-cell[data-dk="${dstr2}"][data-row-id="${rowId}"]`);
    if(!tCell||tCell.classList.contains('nwd-cell')||tCell.classList.contains('arc-cell'))continue;
    for(const proj of state.projects){
      const row=proj.rows.find(r=>r.id===rowId);
      if(row){applyCell(proj,row,dstr2,drag.painting,true);break;}
    }
  }
  drag.lastIdx=curIdx;
});

document.addEventListener('mouseup',()=>{
  if(drag.on){saveHistory();}
  drag.on=false;drag.lastIdx=-1;
});

// ── PIN RESIZE ──
let pinResize={on:false,pinId:null,rowId:null,startDk:null,startX:0,origSpan:1};
document.addEventListener('mousemove',e=>{
  if(!pinResize.on)return;
  const newSpan=Math.max(1,pinResize.origSpan+Math.round((e.clientX-pinResize.startX)/26));
  const pin=state.pins[pinResize.rowId]?.[pinResize.startDk]?.find(p=>p.id===pinResize.pinId);
  if(pin&&pin.span!==newSpan){pin.span=newSpan;renderPinsOnly();}
});
document.addEventListener('mouseup',()=>{if(pinResize.on){saveHistory();pinResize.on=false;}});

// ── ARCHIVE BAR DRAG ──
let arcDrag={on:false,startX:0,startDk:''};
const arcBar=document.getElementById('archive-bar');
arcBar.addEventListener('mousedown',e=>{
  e.preventDefault();e.stopPropagation();
  const days=getDays();
  const si=days.findIndex(d=>dk(d)===state.view.archiveBefore);
  const startBarLeft=si>=0?(si+1)*26:90*26;
  arcDrag={on:true,startX:e.clientX,startDk:state.view.archiveBefore,startIdx:si>=0?si:90,startBarLeft};
  arcBar.classList.add('dragging');
});
document.addEventListener('mousemove',e=>{
  if(!arcDrag.on)return;
  const dx=e.clientX-arcDrag.startX;
  const deltaDays=Math.round(dx/26);
  // Move bar visually using stored startBarLeft
  arcBar.style.left=(arcDrag.startBarLeft+deltaDays*26)+'px';
  const newDk=dk(addD(new Date(arcDrag.startDk),deltaDays));
  const lbl=document.getElementById('archive-bar-label');
  lbl.textContent=newDk;lbl.style.opacity='1';
  if(newDk===state.view.archiveBefore)return;
  state.view.archiveBefore=newDk;
  const days=getDays();
  document.querySelectorAll('.day-cell').forEach((el,i)=>{
    if(i>=days.length)return;
    const dstr=dk(days[i]);
    if(isNWD(dstr))return;
    const arc=isArchived(dstr),dobj=new Date(dstr.replace(/-/g,'/')),dw=dobj.getDay();
    el.classList.toggle('arc-hdr',arc);
    el.classList.toggle('sat',!arc&&dw===6);
    el.classList.toggle('sun',!arc&&dw===0);
    el.classList.toggle('hol',!arc&&isHol(dobj)&&dw!==0&&dw!==6);
    el.classList.toggle('today-hdr',!arc&&dstr===todayStr());
  });
  document.querySelectorAll('.grid-cell').forEach(cell=>{
    const dstr=cell.dataset.dk;if(!dstr||isNWD(dstr))return;
    cell.classList.toggle('arc-cell',isArchived(dstr));
  });});
document.addEventListener('mouseup',()=>{
  if(arcDrag.on){arcDrag.on=false;arcBar.classList.remove('dragging');}
});

// ── RENDER ──
function render(){renderLegend();renderFilter();renderHeader();renderRows();updateArchiveBar();}

function renderLegend(){
  const el=document.getElementById('legend');
  el.innerHTML=state.members.map(m=>`<div class="leg-wrap" data-mid="${m.id}"><div class="leg-dot" style="background:${m.color}"></div><div class="leg-tip">${m.name}</div></div>`).join('');
  el.querySelectorAll('.leg-wrap').forEach(w=>w.addEventListener('click',()=>openMemberPanel(w.dataset.mid)));
}

function renderFilter(){
  const dd=document.getElementById('filter-dropdown');
  dd.innerHTML=`<div class="filter-item" id="filter-clear"><span style="font-size:10px;color:var(--text3)">すべて表示</span></div>`+
    state.members.map(m=>`<div class="filter-item"><input type="checkbox" id="fc-${m.id}" ${filterMembers.has(m.id)?'checked':''}><div class="filter-dot" style="background:${m.color}"></div><span>${m.name}</span></div>`).join('');
  dd.querySelector('#filter-clear').addEventListener('click',()=>{filterMembers.clear();renderFilter();render();updateFilterBtn();});
  state.members.forEach(m=>{
    dd.querySelector(`#fc-${m.id}`)?.addEventListener('change',e=>{
      if(e.target.checked)filterMembers.add(m.id);else filterMembers.delete(m.id);
      render();updateFilterBtn();
    });
  });
}

function updateFilterBtn(){
  document.getElementById('btn-filter').classList.toggle('filter-active',filterMembers.size>0);
}

function renderHeader(){
  const days=getDays();
  const mr=document.getElementById('month-row'),dr=document.getElementById('day-row');
  mr.innerHTML='';dr.innerHTML='';
  const months=[];
  days.forEach(d=>{
    const key=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!months.length||months[months.length-1].key!==key)months.push({key,label:key,w:26});
    else months[months.length-1].w+=26;
  });
  months.forEach(m=>{const el=document.createElement('div');el.className='month-cell';el.style.width=m.w+'px';el.textContent=m.label;mr.appendChild(el);});
  days.forEach(d=>{
    const dstr=dk(d),dw=d.getDay(),arc=isArchived(dstr),nwd=isNWD(dstr);
    const el=document.createElement('div');el.className='day-cell';
    if(nwd)el.classList.add('nwd');
    else if(arc)el.classList.add('arc-hdr');
    else{
      if(dw===6)el.classList.add('sat');else if(dw===0)el.classList.add('sun');else if(isHol(d))el.classList.add('hol');
      if(dstr===todayStr())el.classList.add('today-hdr');
    }
    el.innerHTML=`<span>${d.getDate()}</span>`;
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const isCustomNWD=state.customNonWorkingDays.includes(dstr);
      const isRemovedHol=state.removedHolidays.includes(dstr);
      const isDefaultNWD=(isWknd(d)||isHol(d))&&!isRemovedHol;
      showCtx(e,`
        <div class="ctx-item" data-action="arc-to">🗂 ここまでをアーカイブ</div>
        <div class="ctx-item" data-action="arc-week">🗂 この週までをアーカイブ</div>
        <div class="ctx-sep"></div>
        ${nwd
          ?`<div class="ctx-item" data-action="rm-nwd">✓ 非稼働日を解除</div>`
          :`<div class="ctx-item" data-action="add-nwd">🚫 非稼働日に設定</div>`
        }
      `,{
        'arc-to':()=>{state.view.archiveBefore=dstr;updateArchiveBar();render();},
        'arc-week':()=>{
          const dobj=new Date(dstr),dw2=dobj.getDay();
          state.view.archiveBefore=dk(addD(dobj,dw2===0?0:7-dw2));
          updateArchiveBar();render();
        },
        'add-nwd':()=>{
          saveHistory();
          if(!state.customNonWorkingDays.includes(dstr))state.customNonWorkingDays.push(dstr);
          render();
        },
        'rm-nwd':()=>{
          saveHistory();
          state.customNonWorkingDays=state.customNonWorkingDays.filter(x=>x!==dstr);
          if(isDefaultNWD&&!state.removedHolidays.includes(dstr))state.removedHolidays.push(dstr);
          render();
        },
      });
    });
    dr.appendChild(el);
  });
}

        const handle=lr2.querySelector('.drag-handle');
        handle.addEventListener('dragstart',e=>{dragProj={on:true,projId:proj.id,pinned:isPinned};e.dataTransfer.effectAllowed='move';lg.style.opacity='.4';});
        handle.addEventListener('dragend',()=>{lg.style.opacity='';dragProj.on=false;render();});
      } else {
        lr2.querySelector('.drag-handle').style.opacity='0';
        lr2.querySelector('.drag-handle').style.pointerEvents='none';
      }
      lr2.querySelector('.member-tag').addEventListener('click',e=>{e.stopPropagation();openRowPanel(proj,row);});
      lg.appendChild(lr2);
    });

    const addHint=document.createElement('div');addHint.className='lp-add-row';addHint.textContent='＋ 担当追加';
    addHint.addEventListener('click',()=>openAddRowPanel(proj));lg.appendChild(addHint);

    lg.addEventListener('dragover',e=>{
      if(!dragProj.on||dragProj.projId===proj.id||dragProj.pinned!==isPinned)return;
      e.preventDefault();
      document.querySelectorAll('.lp-group').forEach(g=>g.classList.remove('drag-over-top','drag-over-bottom'));
      const r=lg.getBoundingClientRect();lg.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bottom');
    });
    lg.addEventListener('drop',e=>{
      if(!dragProj.on||dragProj.projId===proj.id||dragProj.pinned!==isPinned)return;
      e.preventDefault();
      const r=lg.getBoundingClientRect(),before=e.clientY<r.top+r.height/2;
      const arr=isPinned?visProjects().pin:visProjects().norm;
      const fi=arr.findIndex(p=>p.id===dragProj.projId),ti=arr.findIndex(p=>p.id===proj.id);
      if(fi<0||ti<0)return;
      const moved=arr.splice(fi,1)[0];
      arr.splice(before?(ti-(fi<ti?1:0)):(ti+(fi>ti?1:0)),0,moved);
      arr.forEach((p,i)=>p.order=i);
      document.querySelectorAll('.lp-group').forEach(g=>g.classList.remove('drag-over-top','drag-over-bottom'));
    });

    const gg=document.createElement('div');gg.className='grid-group'+(isPinned?' pinned-grid':'');
    proj.rows.sort((a,b)=>a.order-b.order).forEach(row=>{
      const mem=getMem(row.memberId);
      const rgb=hexToRgb(mem.color);
      const gr=document.createElement('div');gr.className='grid-row';
      days.forEach((d,di)=>{
        const dstr=dk(d),nwd=isNWD(dstr),arc=isArchived(dstr);
        const cell=document.createElement('div');cell.className='grid-cell';
        cell.dataset.dk=dstr;cell.dataset.rowId=row.id;cell.dataset.di=di;
        if(nwd){cell.classList.add('nwd-cell');}
        else{
          if(isWknd(d))cell.classList.add('wknd');
          if(dstr===todayStr())cell.classList.add('td');
          if(arc)cell.classList.add('arc-cell');
          if(row.cells[dstr])cell.style.background=mem.color+'cc';
          cell.addEventListener('mouseenter',()=>{
            if(!drag.on&&!row.cells[dstr])cell.style.background=`rgba(${rgb},.10)`;
          });
          cell.addEventListener('mouseleave',()=>{
            if(!row.cells[dstr])cell.style.background='';
          });
          cell.addEventListener('mousedown',e=>{
            if(e.button!==0)return;e.preventDefault();
            drag={on:true,rowId:row.id,painting:!row.cells[dstr],lastIdx:parseInt(cell.dataset.di)};
            applyCell(proj,row,dstr,drag.painting,true);
          });
          cell.addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();openInlinePin(cell,row,dstr);});
        }
        gr.appendChild(cell);
      });
      gg.appendChild(gr);
      renderRowPins(gr,row,days);
    });
    const spacer=document.createElement('div');spacer.className='grid-spacer';gg.appendChild(spacer);
    lr.appendChild(lg);ra.appendChild(gg);
  }

  norm.forEach(p=>renderGroup(p,false));
  if(pin.length){
    const ls=document.createElement('div');ls.id='pinned-sep';ls.textContent='固定案件';lr.appendChild(ls);
    const gs=document.createElement('div');gs.className='grid-sep';ra.appendChild(gs);
    pin.forEach(p=>renderGroup(p,true));
  }
}

function renderRowPins(gr,row,days){
  const rp=state.pins[row.id];if(!rp)return;
  const cells=gr.querySelectorAll('.grid-cell');
  Object.entries(rp).forEach(([dstr,pins])=>{
    if(!pins||!pins.length)return;
    const idx=days.findIndex(d=>dk(d)===dstr);if(idx<0)return;
    const cell=cells[idx];if(!cell||cell.classList.contains('nwd-cell'))return;
    pins.forEach(pin=>{
      const wrap=document.createElement('div');wrap.className='pin-wrap';wrap.style.width=((pin.span||1)*26)+'px';
      wrap.innerHTML=`<div class="pin-label-inner">${pin.label}</div><div class="pin-resize"></div>`;
      wrap.querySelector('.pin-resize').addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();
        pinResize={on:true,pinId:pin.id,rowId:row.id,startDk:dstr,startX:e.clientX,origSpan:pin.span||1};
      });
      wrap.addEventListener('contextmenu',e=>{
        e.preventDefault();e.stopPropagation();
        showCtx(e,`<div class="ctx-item danger" data-action="del">✕ ピンを削除</div>`,{
          del:()=>{saveHistory();state.pins[row.id][dstr]=state.pins[row.id][dstr].filter(p=>p.id!==pin.id);if(!state.pins[row.id][dstr].length)delete state.pins[row.id][dstr];render();}
        });
      });
      cell.appendChild(wrap);
    });
  });
}

function renderPinsOnly(){
  document.querySelectorAll('.pin-wrap').forEach(el=>el.remove());
  const days=getDays();
  document.querySelectorAll('.grid-row').forEach(gr=>{
    const cells=gr.querySelectorAll('.grid-cell');if(!cells.length)return;
    const rowId=cells[0]?.dataset.rowId;if(!rowId)return;
    const row=state.projects.flatMap(p=>p.rows).find(r=>r.id===rowId);if(!row)return;
    renderRowPins(gr,row,days);
  });
}

function applyCell(proj,row,dstr,paint,skipSave=false){
  if(paint)row.cells[dstr]=true;else delete row.cells[dstr];
  const mem=getMem(row.memberId);
  const cell=document.querySelector(`.grid-cell[data-dk="${dstr}"][data-row-id="${row.id}"]`);
  if(!cell)return;
  if(paint)cell.style.background=mem.color+'cc';else cell.style.background='';
  if(!skipSave)saveHistory();
}

function updateArchiveBar(){
  const days=getDays();
  const aIdx=days.findIndex(d=>dk(d)===state.view.archiveBefore);
  const bar=document.getElementById('archive-bar');
  if(aIdx>=0){bar.style.display='block';bar.style.left=((aIdx+1)*26)+'px';}
  else bar.style.display='none';
  document.getElementById('archive-bar-label').textContent=state.view.archiveBefore;
}


function openInlinePin(cell,row,dstr){
  document.querySelectorAll('.pin-input-wrap').forEach(el=>el.remove());
  const wrap=document.createElement('div');wrap.className='pin-input-wrap';wrap.style.width='80px';
  const input=document.createElement('input');input.className='pin-input';input.placeholder='ラベル…';
  wrap.appendChild(input);cell.appendChild(wrap);input.focus();
  function commit(){
    const label=input.value.trim();wrap.remove();if(!label)return;
    saveHistory();
    if(!state.pins[row.id])state.pins[row.id]={};
    if(!state.pins[row.id][dstr])state.pins[row.id][dstr]=[];
    state.pins[row.id][dstr].push({id:uid('pin'),label,span:1});render();
  }
  input.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape')wrap.remove();});
  input.addEventListener('blur',()=>setTimeout(()=>wrap.remove(),100));
}

// ── CTX ──
function showCtx(e,html,actions){
  const menu=document.getElementById('ctx');menu.innerHTML=html;menu.style.display='block';
  let x=e.clientX,y=e.clientY;menu.style.left=x+'px';menu.style.top=y+'px';
  requestAnimationFrame(()=>{const r=menu.getBoundingClientRect();if(r.right>window.innerWidth)menu.style.left=(x-r.width)+'px';if(r.bottom>window.innerHeight)menu.style.top=(y-r.height)+'px';});
  menu.querySelectorAll('.ctx-item[data-action]').forEach(item=>item.addEventListener('click',()=>{hideCtx();actions[item.dataset.action]&&actions[item.dataset.action]();}));
}
function hideCtx(){document.getElementById('ctx').style.display='none';}
document.addEventListener('mousedown',e=>{if(!document.getElementById('ctx').contains(e.target))hideCtx();});

function showProjCtx(e,proj){
  showCtx(e,`
    <div class="ctx-item" data-action="edit">✏️ 編集</div>
    <div class="ctx-item ctx-sub">🏷 ステータスを変更 ▶
      <div class="ctx-sub-menu">
        ${Object.entries(STATUS_LABELS).map(([k,v])=>`<div class="ctx-item" data-status="${k}">${proj.status===k?'✓ ':''} ${v}</div>`).join('')}
      </div>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="pin-toggle">${proj.pinned?'📌 固定を解除':'📌 最下部に固定'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" data-action="del">🗑 案件を削除</div>
  `,{
    edit:()=>openEditProjPanel(proj),
    'pin-toggle':()=>{saveHistory();proj.pinned=!proj.pinned;render();},
    del:()=>{saveHistory();state.projects=state.projects.filter(p=>p.id!==proj.id);render();}
  });
  setTimeout(()=>{
    document.querySelectorAll('.ctx-sub-menu .ctx-item[data-status]').forEach(item=>{
      item.addEventListener('click',()=>{saveHistory();proj.status=item.dataset.status;hideCtx();render();});
    });
  },10);
}

// ── PANEL ──
let panelOnOk=null;
function openPanel(title,bodyHtml,footerHtml,onOk,onDelete){
  document.getElementById('panel-title').textContent=title;
  document.getElementById('panel-body').innerHTML=bodyHtml;
  document.getElementById('panel-footer').innerHTML=footerHtml||`<button class="btn-c" id="pnl-cancel">キャンセル</button><button class="btn-ok" id="pnl-ok">保存</button>`;
  panelOnOk=onOk;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('pnl-ok')?.addEventListener('click',()=>{if(panelOnOk&&panelOnOk()!==false)closePanel();});
  document.getElementById('pnl-cancel')?.addEventListener('click',closePanel);
  document.getElementById('pnl-delete')?.addEventListener('click',()=>{if(onDelete&&onDelete()!==false)closePanel();});
  document.getElementById('panel-body').querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&panelOnOk&&panelOnOk()!==false)closePanel();});
  });
  setTimeout(()=>document.getElementById('panel-body').querySelector('input,select')?.focus(),120);
}
function closePanel(){document.getElementById('panel-overlay').classList.remove('open');panelOnOk=null;}
document.getElementById('panel-close').addEventListener('click',closePanel);

function paletteHtml(sel){
  return `<div class="palette-grid">${PALETTE.map(c=>`<div class="pswatch${c===sel?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('')}</div>
  <div class="hex-row"><input type="color" id="color-picker" value="${sel||PALETTE[0]}"><input type="text" id="color-hex" value="${sel||PALETTE[0]}" maxlength="7" placeholder="#000000"></div>`;
}
function bindPalette(container){
  let picked=container.querySelector('.pswatch.sel')?.dataset.c||PALETTE[0];
  const picker=container.querySelector('#color-picker'),hexInput=container.querySelector('#color-hex');
  function selectColor(c){picked=c;container.querySelectorAll('.pswatch').forEach(s=>s.classList.toggle('sel',s.dataset.c===c));if(picker)picker.value=c;if(hexInput)hexInput.value=c;}
  container.querySelectorAll('.pswatch').forEach(s=>s.addEventListener('click',()=>selectColor(s.dataset.c)));
  picker?.addEventListener('input',()=>selectColor(picker.value));
  hexInput?.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(hexInput.value))selectColor(hexInput.value);});
  return()=>picked;
}

function projFormHtml(proj){
  const memOpts=state.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  return`
    <div class="fg"><label>案件名</label><input type="text" id="pname" value="${proj?.name||''}"></div>
    <div class="fg"><label>ページ数</label><input type="text" id="ppages" value="${proj?.pages||''}" placeholder="例：18P"></div>
    <div class="fg"><label>制作開始</label><input type="text" id="pstart" value="${proj?.start||''}" placeholder="例：2025/6"></div>
    <div class="fg"><label>期限</label><input type="text" id="pdead" value="${proj?.deadline||''}" placeholder="例：なし"></div>
    ${!proj?`<div class="fg"><label>担当1</label><select id="pm1">${memOpts}</select></div><div class="fg"><label>担当2（任意）</label><select id="pm2"><option value="">なし</option>${memOpts}</select></div>`:''}
  `;
}

function openInlineCellEdit(cellEl, getValue, setValue){
  if(cellEl.querySelector('.cell-inline-input'))return;
  cellEl.classList.add('editing');
  const input=document.createElement('input');
  input.className='cell-inline-input';
  input.value=getValue();
  cellEl.appendChild(input);
  input.focus();input.select();
  function commit(){
    const val=input.value.trim();
    input.remove();cellEl.classList.remove('editing');
    setValue(val);render();
  }
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){input.remove();cellEl.classList.remove('editing');}});
  input.addEventListener('blur',()=>setTimeout(()=>{if(cellEl.contains(input)){input.remove();cellEl.classList.remove('editing');}},100));
}

function openAddProjPanel(){
  openPanel('＋ 案件を追加',projFormHtml(null),null,()=>{
    const name=document.getElementById('pname').value.trim();if(!name)return false;
    saveHistory();
    const m1=document.getElementById('pm1').value,m2=document.getElementById('pm2').value;
    const rows=[{id:uid('r'),memberId:m1,order:0,cells:{}}];
    if(m2)rows.push({id:uid('r'),memberId:m2,order:1,cells:{}});
    state.projects.push({id:uid('p'),name,pages:document.getElementById('ppages').value.trim(),start:document.getElementById('pstart').value.trim(),deadline:document.getElementById('pdead').value.trim()||'なし',order:state.projects.filter(p=>!p.pinned).length,status:'active',pinned:false,rows});
    render();
  });
}

function openEditProjPanel(proj){
  openPanel('案件を編集',projFormHtml(proj),
    `<button class="btn-danger" id="pnl-delete">削除</button><button class="btn-c" id="pnl-cancel">キャンセル</button><button class="btn-ok" id="pnl-ok">保存</button>`,()=>{
    const name=document.getElementById('pname').value.trim();if(!name)return false;
    saveHistory();
    proj.name=name;proj.pages=document.getElementById('ppages').value.trim();
    proj.start=document.getElementById('pstart').value.trim();proj.deadline=document.getElementById('pdead').value.trim();
    render();
  },()=>{saveHistory();state.projects=state.projects.filter(p=>p.id!==proj.id);render();});
}

function openMemberPanel(mid){
  const mem=getMem(mid);
  openPanel('メンバーを編集',`<div class="fg"><label>名前</label><input type="text" id="mn" value="${mem.name}"></div><div class="fg"><label>カラー</label>${paletteHtml(mem.color)}</div>`,
    `<button class="btn-danger" id="pnl-delete">削除</button><button class="btn-c" id="pnl-cancel">キャンセル</button><button class="btn-ok" id="pnl-ok">保存</button>`,()=>{
    const name=document.getElementById('mn').value.trim();if(!name)return false;
    const getC=bindPalette(document.getElementById('panel-body'));
    mem.name=name;mem.color=getC();render();
  },()=>{state.members=state.members.filter(m=>m.id!==mid);render();});
  setTimeout(()=>bindPalette(document.getElementById('panel-body')),20);
}

function openAddMemberPanel(){
  openPanel('＋ メンバーを追加',`<div class="fg"><label>名前</label><input type="text" id="mn"></div><div class="fg"><label>カラー</label>${paletteHtml(PALETTE[state.members.length%PALETTE.length])}</div>`,null,()=>{
    const name=document.getElementById('mn').value.trim();if(!name)return false;
    const getC=bindPalette(document.getElementById('panel-body'));
    state.members.push({id:uid('m'),name,color:getC()});render();
  });
  setTimeout(()=>bindPalette(document.getElementById('panel-body')),20);
}

function openRowPanel(proj,row){
  const memOpts=state.members.map(m=>`<option value="${m.id}"${m.id===row.memberId?' selected':''}>${m.name}</option>`).join('');
  openPanel('担当者を変更',`<div class="fg"><label>担当者</label><select id="rm">${memOpts}</select></div>`,
    `<button class="btn-danger" id="pnl-delete">行を削除</button><button class="btn-c" id="pnl-cancel">キャンセル</button><button class="btn-ok" id="pnl-ok">変更</button>`,()=>{
    saveHistory();row.memberId=document.getElementById('rm').value;render();
  },()=>{
    if(proj.rows.length>1){saveHistory();proj.rows=proj.rows.filter(r=>r.id!==row.id);render();}
    else{alert('最後の担当者行は削除できません。');return false;}
  });
}

function openAddRowPanel(proj){
  const memOpts=state.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  openPanel('担当者を追加',`<div style="font-size:11px;color:var(--text3);margin-bottom:12px">${proj.name}</div><div class="fg"><label>担当者</label><select id="rm">${memOpts}</select></div>`,null,()=>{
    saveHistory();proj.rows.push({id:uid('r'),memberId:document.getElementById('rm').value,order:proj.rows.length,cells:{}});render();
  });
}

// ── TOOLBAR ──
document.getElementById('today-btn').addEventListener('click',()=>{
  const days=getDays(),idx=days.findIndex(d=>dk(d)===todayStr());
  if(idx>=0)document.getElementById('scroll-pane').scrollLeft=Math.max(0,idx*26-100);
});
document.getElementById('btn-add-proj').addEventListener('click',openAddProjPanel);
document.getElementById('add-proj-foot').addEventListener('click',openAddProjPanel);
document.getElementById('btn-add-member').addEventListener('click',openAddMemberPanel);
document.getElementById('leg-add').addEventListener('click',openAddMemberPanel);
document.getElementById('btn-show-done').addEventListener('click',function(){showDone=!showDone;this.classList.toggle('toggle-on',showDone);render();});

// filter toggle
document.getElementById('btn-filter').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('filter-dropdown').classList.toggle('open');
});
document.addEventListener('click',()=>document.getElementById('filter-dropdown').classList.remove('open'));

document.getElementById('btn-save').addEventListener('click',()=>{
  state.meta.updatedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='onca-chart.json';a.click();
});
document.getElementById('btn-load').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);d.view=d.view||{archiveBefore:dk(addD(new Date(),-1)),days:270};d.customNonWorkingDays=d.customNonWorkingDays||[];d.removedHolidays=d.removedHolidays||[];Object.assign(state,d);render();}catch{alert('読込に失敗しました。');}};
  r.readAsText(f);e.target.value='';
});

// scroll sync
const sp=document.getElementById('scroll-pane'),lrEl=document.getElementById('left-rows');
sp.addEventListener('scroll',()=>{lrEl.scrollTop=sp.scrollTop;});

// init
render();
saveHistory();
requestAnimationFrame(()=>{
  const days=getDays();
  const aIdx=days.findIndex(d=>dk(d)===state.view.archiveBefore);
  const focusIdx=aIdx>=0?aIdx+1:days.findIndex(d=>dk(d)===todayStr());
  if(focusIdx>=0)sp.scrollLeft=Math.max(0,focusIdx*26-80);
});
</script>
